name: traefik

networks:
  proxy:
    external: true
  socket_proxy:
    external: true

services:
  traefik:
    container_name: traefik
    image: traefik:v3.7.5
    restart: unless-stopped
    networks:
      - proxy         # reach app containers + cloudflared
      - socket_proxy  # reach the docker socket proxy (must start first)
    # No `ports:` on purpose. cloudflared reaches it at http://traefik:80
    # over the internal network. Nothing is published to the host.
    # No docker.sock mount either — discovery goes through socket-proxy.
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
    environment:
      - DOMAIN=${DOMAIN}
      # Docker API version is auto-negotiated since Traefik v3.6.1+ (it pings the
      # daemon through socket-proxy and uses the version it advertises). Older
      # Traefik hard-coded API 1.24 and the daemon rejected it as too old.
    labels:
      traefik.enable: "true"
      traefik.http.routers.dashboard.rule: "Host(`traefik-private.${DOMAIN}`)"
      traefik.http.routers.dashboard.entrypoints: "web"
      traefik.http.routers.dashboard.service: "api@internal"
      traefik.http.routers.dashboard.middlewares: "security-headers@file"
